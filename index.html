<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="container_Left">
            <div class="top">
                <h1>Sign In</h1>
            </div>
            <div class="middle">
                <img src="images/img.png" alt="">
            </div>
            <div class="bottom">
                <p>Step into a world of endless possibilities as you cross the digital threshold to our<br>vibrant online community, where diverse and shared experiences unfold</p>
            </div>
        </div>
        <div class="container_Right">
            <div class="top">
                <h1>Welcome Back</h1>
            </div>
            <div class="middle">
                <h1>Login your Account</h1>
                <hr>
                <form>
                    <label for="Username">Username</label>
                    <input type="email" id="email" required autocomplete="off">
                    <label for="Password">Password</label>
                    <input type="password" id="password" required>
                    <div class="submit_Btn">
                        <input type="submit" id="login" value="Login">
                    </div>
                </form>
                <a href="#" id="CR">Create Account</a>
            </div>
            <div class="bottom">
                <a href="#">Forgot Password</a>
                <hr>
            </div>
        </div>
    </div>
</body>
</html>
